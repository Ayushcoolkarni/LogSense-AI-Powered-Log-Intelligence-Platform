server:
  port: 8083

spring:
  application:
    name: rca-engine-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/logplatform
    username: ${DB_USER:logplatform}
    password: ${DB_PASS:logplatform123}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: rca-engine
      auto-offset-reset: earliest
      enable-auto-commit: false
  task:
    execution:
      pool:
        core-size: 4
        max-size: 10
        queue-capacity: 50

kafka:
  topics:
    anomaly-events: anomaly-events

# ── Gemini AI (Primary) ────────────────────────────────────────────────────
# Free tier: https://aistudio.google.com/app/apikey
# 15 RPM, 1M TPM, 1500 RPD — no credit card needed
gemini:
  api:
    enabled: ${GEMINI_ENABLED:false}
    key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}

# ── Anthropic (disabled) ───────────────────────────────────────────────────
anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
    model: claude-opus-4-20250514
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.logplatform: INFO
