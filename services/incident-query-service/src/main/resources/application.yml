server:
  port: 8085

spring:
  application:
    name: incident-query-service

  datasource:
    url: jdbc:postgresql://localhost:5432/logplatform
    username: logplatform
    password: logplatform123
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  task:
    scheduling:
      pool:
        size: 2

services:
  anomaly-detector:
    url: http://localhost:8082
  rca-engine:
    url: http://localhost:8083
  alert:
    url: http://localhost:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.logplatform: INFO
