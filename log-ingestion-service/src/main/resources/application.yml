server:
  port: 8081

spring:
  application:
    name: log-ingestion-service

  datasource:
    url: jdbc:postgresql://localhost:5432/logplatform
    username: logplatform
    password: logplatform123
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

kafka:
  topics:
    raw-logs: raw-logs
    error-logs: error-logs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  ratelimiter:
    instances:
      logIngestion:
        limitForPeriod: 10000
        limitRefreshPeriod: 1s
        timeoutDuration: 0

logging:
  level:
    com.logplatform: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
