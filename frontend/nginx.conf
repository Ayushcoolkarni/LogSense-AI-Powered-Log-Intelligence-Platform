server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy rules ────────────────────────────────────────────────────
    # incident-query-service  → :8085
    location /api/v1/incidents {
        proxy_pass http://incident-query-service:8085;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # anomaly-detector-service → :8082
    location /api/v1/anomalies {
        proxy_pass http://anomaly-detector-service:8082;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # log-ingestion-service → :8081
    location /api/v1/logs {
        proxy_pass http://log-ingestion-service:8081;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # alert-service → :8084
    location /api/v1/alerts {
        proxy_pass http://alert-service:8084;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # rca-engine-service → :8083
    location /api/v1/rca {
        proxy_pass http://rca-engine-service:8083;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
