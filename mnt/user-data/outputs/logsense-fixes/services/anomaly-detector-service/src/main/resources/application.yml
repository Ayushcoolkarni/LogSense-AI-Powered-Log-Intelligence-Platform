server:
  port: 8082

spring:
  application:
    name: anomaly-detector-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logplatform}
    username: ${SPRING_DATASOURCE_USERNAME:logplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:logplatform123}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: anomaly-detector
      auto-offset-reset: earliest
      enable-auto-commit: false

kafka:
  topics:
    error-logs: error-logs
    raw-logs: raw-logs

anomaly:
  error-rate:
    window-seconds: 60
    threshold: 50
  repeated-error:
    window-seconds: 120
    threshold: 10
  volume-spike:
    window-seconds: 30
    threshold: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.logplatform: INFO
