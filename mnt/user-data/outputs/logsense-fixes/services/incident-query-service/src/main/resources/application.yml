server:
  port: 8085

spring:
  application:
    name: incident-query-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logplatform}
    username: ${SPRING_DATASOURCE_USERNAME:logplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:logplatform123}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  task:
    scheduling:
      pool:
        size: 2

services:
  anomaly-detector:
    url: ${SERVICES_ANOMALY_DETECTOR_URL:http://localhost:8082}
  rca-engine:
    url: ${SERVICES_RCA_ENGINE_URL:http://localhost:8083}
  alert:
    url: ${SERVICES_ALERT_URL:http://localhost:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.logplatform: INFO
