version: "3.9"

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:15
    container_name: logsense-postgres
    environment:
      POSTGRES_DB: logplatform
      POSTGRES_USER: logplatform
      POSTGRES_PASSWORD: logplatform123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logplatform -d logplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: logsense-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ───────────────────────────────────────────────────

  log-ingestion-service:
    build:
      context: ../services/log-ingestion-service
    container_name: log-ingestion-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://logsense-postgres:5432/logplatform
      SPRING_DATASOURCE_USERNAME: logplatform
      SPRING_DATASOURCE_PASSWORD: logplatform123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: logsense-redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  anomaly-detector-service:
    build:
      context: ../services/anomaly-detector-service
    container_name: anomaly-detector-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://logsense-postgres:5432/logplatform
      SPRING_DATASOURCE_USERNAME: logplatform
      SPRING_DATASOURCE_PASSWORD: logplatform123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: logsense-redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  rca-engine-service:
    build:
      context: ../services/rca-engine-service
    container_name: rca-engine-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://logsense-postgres:5432/logplatform
      SPRING_DATASOURCE_USERNAME: logplatform
      SPRING_DATASOURCE_PASSWORD: logplatform123
      DB_HOST: logsense-postgres
      DB_USER: logplatform
      DB_PASS: logplatform123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-false}
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  alert-service:
    build:
      context: ../services/alert-service
    container_name: alert-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://logsense-postgres:5432/logplatform
      SPRING_DATASOURCE_USERNAME: logplatform
      SPRING_DATASOURCE_PASSWORD: logplatform123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-ops@company.com}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  incident-query-service:
    build:
      context: ../services/incident-query-service
    container_name: incident-query-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      anomaly-detector-service:
        condition: service_healthy
      rca-engine-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://logsense-postgres:5432/logplatform
      SPRING_DATASOURCE_USERNAME: logplatform
      SPRING_DATASOURCE_PASSWORD: logplatform123
      SPRING_DATA_REDIS_HOST: logsense-redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVICES_ANOMALY_DETECTOR_URL: http://anomaly-detector-service:8082
      SERVICES_RCA_ENGINE_URL: http://rca-engine-service:8083
      SERVICES_ALERT_URL: http://alert-service:8084
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ../frontend
    container_name: logsense-frontend
    depends_on:
      incident-query-service:
        condition: service_healthy
    ports:
      - "3000:3000"

networks:
  default:
    name: logsense-network

volumes:
  postgres-data:
