server:
  port: 8083

spring:
  application:
    name: rca-engine-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logplatform}
    username: ${SPRING_DATASOURCE_USERNAME:logplatform}
    password: ${SPRING_DATASOURCE_PASSWORD:logplatform123}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: rca-engine
      auto-offset-reset: earliest
      enable-auto-commit: false

  task:
    execution:
      pool:
        core-size: 4
        max-size: 10
        queue-capacity: 50

kafka:
  topics:
    anomaly-events: anomaly-events

gemini:
  api:
    enabled: ${GEMINI_ENABLED:false}
    key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
    model: claude-opus-4-20250514
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.logplatform: INFO
